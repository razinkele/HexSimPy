# Nemunas Delta H3 test landscape — Phase 3 of the H3Mesh backend plan.
#
# Loads the H3-tessellated Nemunas bbox produced by
# scripts/build_nemunas_h3_landscape.py: 106k cells at H3 res 9
# (~200 m edge), real EMODnet bathymetry, 30 days of CMEMS forcing.
#
# This is a methodological smoke test, NOT an ecological-realism run —
# see docs/superpowers/specs/2026-04-24-nemunas-delta-h3.md "Known
# limitations" for what this scenario does and does not validate.

name: "nemunas_h3_test"
mesh_backend: "h3"
h3_landscape_nc: "data/nemunas_h3_landscape.nc"

# Baltic salmon bioenergetics — same params the Curonian TriMesh test uses.
species_config: "configs/baltic_salmon_species.yaml"

# Random initial placement over the water mask. NOT ecologically meaningful;
# see Simulation._place_agents_uniform_random_water docstring.
initial_state:
  initial_cell_strategy: "uniform_random_water"

# Synthetic mid-lagoon barrier — illustrative, not calibrated.  Set to
# null to disable.  See scripts/build_nemunas_h3_barriers.py for how
# the CSV is generated.
barriers_csv: "data/nemunas_h3_barriers.csv"

# Per-reach DAILY fish-predation survival probability.  Internally
# converted to hourly via p_hour = p_day**(1/24); the predation event
# fires every step so the daily rate is the bookkeeping target.
# Values mirror inSTREAM example_baltic's `fish_pred_min` per reach.
# Reaches not listed (or backends without reach_id) fall back to
# `default`.
mortality_per_reach:
  Nemunas:        0.985    # rivers — terrestrial and small-fish predation
  Atmata:         0.970
  Minija:         0.980
  Sysa:           0.960
  Skirvyte:       0.950
  Leite:          0.955
  Gilija:         0.955
  CuronianLagoon: 0.800    # lagoon — pike, perch, cormorants
  BalticCoast:    0.700    # nearshore Baltic
  OpenBaltic:     0.650    # offshore — seals + cod
  default:        0.985
