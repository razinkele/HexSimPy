# Baltic Atlantic salmon (Salmo salar) species configuration for HexSim.
#
# Adapted from inSTREAM's configs/baltic_salmon_species.yaml with HexSim
# schema reconciliation:
#   - spawn_start_day "10-15" (MM-DD string)  →  spawn_window_start_day: 288 (DOY integer)
#   - weight_A/B                                 →  LW_a/LW_b (HexSim naming)
#   - single T_MAX=20                            →  T_AVOID=20 + T_ACUTE_LETHAL=24
#     (v3 of the Curonian realism plan: 20°C hard-kill would wipe agents every
#      Curonian summer; split into behavioral-avoidance and acute-lethal)
#   - Corrected Handeland et al. 2008 DOI: .03.057 → .06.042 (.03.057 points
#     to a flounder genetics paper)
#
# All scientifically-sensitive parameters are sourced from peer-reviewed
# literature; inline citations preserve inSTREAM's provenance audit trail.
# See docs/superpowers/plans/2026-04-24-curonian-realism-upgrades.md for
# the full revision history and rationale.

species:
  BalticAtlanticSalmon:
    # --- Wisconsin bioenergetics ---
    RA: 0.00264
    RB: -0.217
    RQ: 0.06818
    ED_MORTAL: 4.0
    ED_TISSUE: 36.0  # lipid-first catabolism (Brett 1995; Breck 2008)
    MASS_FLOOR_FRACTION: 0.5

    # --- CMax allometric (Smith 2009 Thornton-Lessem post-smolt curve) ---
    cmax_A: 0.303
      # [Smith, Booker & Wells 2009, doi:10.1016/j.marenvres.2008.12.010 —
      #  marine-phase post-smolt Salmo salar CMax allometric intercept]
    cmax_B: -0.275
      # [Smith, Booker & Wells 2009, doi:10.1016/j.marenvres.2008.12.010 —
      #  marine-phase post-smolt Salmo salar CMax allometric slope]

    # --- Thermal response (two-threshold, HexSim v3) ---
    T_OPT: 16.0
      # [Jensen, Jonsson & Forseth 2001, doi:10.1046/j.0269-8463.2001.00572.x
      #  — Atlantic salmon thermal performance]
    T_AVOID: 20.0
      # [Handeland, Imsland & Stefansson 2008, doi:10.1016/j.aquaculture.2008.06.042
      #  — post-smolt zero-growth upper; behavioral avoidance NOT acute mortality]
    T_ACUTE_LETHAL: 24.0
      # [Elliott & Elliott 2010 review; Smialek, Pander & Geist 2021,
      #  doi:10.1111/fme.12507 — Atlantic salmon acute thermal mortality]

    # --- Length-weight relationship ---
    LW_a: 0.0077
      # [Baltic Atlantic salmon typical LW range; exact source under verification]
    LW_b: 3.05

    # --- Fecundity (linear approximation; real form declines with size) ---
    fecundity_per_g: 2.0

    # --- Spawning phenology (day-of-year integers, Lithuanian Nemunas basin) ---
    spawn_window_start_day: 288   # Oct 15
    spawn_window_end_day: 334     # Nov 30
    spawn_temp_min_c: 5.0
    spawn_temp_max_c: 14.0
      # [Heggberget & Wallace 1984; Heinimaa & Heinimaa 2003 for Baltic reference]

    # --- Activity multipliers by behavior ---
    activity_by_behavior:
      0: 1.0   # HOLD
      1: 1.2   # RANDOM
      2: 0.8   # TO_CWR
      3: 1.5   # UPSTREAM
      4: 1.0   # DOWNSTREAM
    # NOTE: wild baseline inherited from inSTREAM Snyder Chinook;
    # Baltic-specific verification has not been done. The hatchery
    # contrast below is layered on a known-uncertain baseline.
    #
    # C2 hatchery vs wild parameter divergence (see
    # docs/superpowers/specs/2026-05-01-hatchery-c2-bioparams-design.md).
    # Empirically-bounded activity scaling factor representing reduced
    # aerobic scope (Zhang et al. 2016, doi:10.1016/j.aquaculture.2016.05.015)
    # and higher swimming cost per unit displacement (Enders, Boisclair
    # & Roy 2004, doi:10.1139/f04-211: 12-29% range in seventh-generation
    # domesticated Salmo salar; F1 costs not statistically different
    # from wild in same study). Lithuanian programme (~4-7 generations
    # since 1997) falls in intermediate range.
    #
    # CALIBRATION STATUS: +25% increment is empirically bracketed but
    # not directly measured for Lithuanian Žeimena/Simnas hatchery
    # stocks. Treat as calibration-grade. Mandatory sensitivity sweep
    # before publication: {0%, +12.5%, +25%, +37.5%}. Cap at +40%
    # without additional citation support.
    #
    # EFFECT SIZE: ~0.21 pp mass-loss differential over 21d realistic
    # mixed-behavior migration. C2 alone is the architectural enabler
    # for compound contrast (with osmoregulation stress, longer
    # corridors, future C3 behaviour divergences); not standalone
    # survival driver.
    #
    # DOWNSTREAM (4) UNCHANGED — passive drift; morphological
    # inefficiency suppressed when current provides thrust. No direct
    # citation; rationale is hydrodynamic (drag vs thrust allocation).
    # C3.1: wild reproducers always proceed (skip probability 0.0)
    pre_spawn_skip_prob: 0.0

    # Sea-age distribution (trinomial 1SW/2SW/3SW). Wild baseline
    # anchored to WGBAST annual-report ranges for wild Baltic stocks.
    # Validated in BalticBioParams.__post_init__ (keys in {1,2,3},
    # positive, sum = 1.0 ± 1e-6).
    sea_age_distribution:
      1: 0.35
      2: 0.55
      3: 0.10

    hatchery_overrides:
      activity_by_behavior:
        1: 1.5     # RANDOM:  +25% (1.2 → 1.5)
        3: 1.875   # UPSTREAM: +25% (1.5 → 1.875)
        # HOLD (0), TO_CWR (2), DOWNSTREAM (4) inherit wild values
        # via shallow-merge.

      # C3.1: pre-spawn skip probability for hatchery reproducers.
      # Empirical anchor: Bouchard, Wellband, Lecomte et al. 2022
      # (doi:10.1111/eva.13374) — captive-bred Atlantic salmon RRS
      # 0.65-0.80 (MSW females + males 80%; 1SW males 65%).
      # Cross-species meta-analytic baseline: Christie, Ford & Blouin
      # 2014 (doi:10.1111/eva.12183) — early-generation hatchery fish
      # average HALF the reproductive success of wild counterparts
      # across 4 salmon species.
      # Population-scale supportive-breeders study: Jonsson et al.
      # 2019 (doi:10.1111/csp2.85) — 81% reduction in smolts/breeder
      # at 95% hatchery, but mixes spawning + offspring survival.
      # Lithuanian Žeimena/Simnas programme (~4-7 generations since
      # 1997) is intermediate between Bouchard 2022 and Christie 2014.
      #
      # MECHANISTIC SHAPE: Bouchard 2022 found "captive-breeding did
      # not directly affect the number of offspring per mating event
      # but instead the number of mating events" — directly validates
      # the pre-spawn skip-rate model intervention (rather than clutch-
      # size reduction). This is the strongest single empirical
      # rationale for the C3.1 model intervention shape.
      #
      # CALIBRATION STATUS: 0.3 corresponds to RRS ≈ 0.7, mid-range
      # of Bouchard 2022 Atlantic salmon estimates. Treat as
      # calibration-grade. Mandatory sensitivity sweep before
      # publication: {0.0, 0.15, 0.30, 0.50}. Cap at 0.6 — beyond
      # exceeds Christie 2014 lower bound for Salmo salar.
      #
      # SCOPE-OUT (deferred): origin inheritance (offspring stay
      # tagged ORIGIN_WILD per C1 scope-OUT); sex-specific skip
      # (Bouchard 2022 found males more affected; current model
      # doesn't track sex); year-to-year RRS stochasticity (single
      # constant skip probability per scenario).
      pre_spawn_skip_prob: 0.3

      # Hatchery sea-age shift toward grilse (1SW). Empirical anchor:
      # Jokikokko, Kallio-Nyberg & Jutila 2004
      # (doi:10.1111/j.1439-0426.2004.00491.x) — Simojoki
      # reared-stocked-as-smolts produce considerably higher 1SW
      # fraction. Sensitivity sweep 1SW in {0.35, 0.45, 0.55, 0.65};
      # cap 0.7. Full-replacement override (all three keys
      # required). See spec for scope-OUT and full provenance.
      sea_age_distribution:
        1: 0.55
        2: 0.40
        3: 0.05
